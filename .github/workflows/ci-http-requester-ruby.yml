# Kører RSpec for MQTT/HTTP-workeren. Path-filtreret så resten af monorepoet ikke trigger CI.
name: CI · Ruby HTTP worker (RSpec)

on:
  push:
    paths:
      - "HTTP/http_requester/**"
      - ".github/workflows/ci-http-requester-ruby.yml"
  pull_request:
    paths:
      - "HTTP/http_requester/**"
      - ".github/workflows/ci-http-requester-ruby.yml"
  workflow_dispatch:

jobs:
  ruby_http_requester_tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: HTTP/http_requester

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # setup-ruby@v1: brug ruby-version (ikke ruby-version-file). 3.3 matcher Dockerfile + .ruby-version.
      - name: Ruby og Bundler (cache)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: HTTP/http_requester

      - name: Kør RSpec
        run: bundle exec rspec --format documentation
