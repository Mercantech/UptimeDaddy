map $http_user_agent $is_social_bot {
    default 0;
    ~*(facebookexternalhit|Facebot|Twitterbot|Slackbot|Discordbot|LinkedInBot|WhatsApp|TelegramBot|Embedly|Pinterestbot) 1;
}

server {
    listen 5173;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    location = /index.html {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Sociale mediers crawlers får Open Graph HTML fra API
    location ~ ^/b/(?<board_id>[^/]+)/?$ {
        add_header Content-Security-Policy "frame-ancestors *" always;

        set $social_route 0;
        if ($is_social_bot) {
            set $social_route 1;
        }
        if ($social_route = 1) {
            rewrite ^ /internal-social/$board_id last;
        }

        try_files $uri /index.html;
    }

    location ~ ^/internal-social/(?<board_id>[^/]+)/?$ {
        proxy_pass http://uptimedaddy-api:8080/api/public/boards/$board_id/social;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
