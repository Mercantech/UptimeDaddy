global:
  scrape_interval: 15s

rule_files:
- /etc/prometheus/rules/alert_rules.yml

scrape_configs:
  - job_name: 'uptimedaddy_api'
    metrics_path: /metrics
    static_configs:
      - targets: ['10.133.51.121:8080']

  # blackbox exporter itself (optional visibility)
  - job_name: 'blackbox_exporter'
    metrics_path: /metrics
    static_configs:
      - targets: ['blackbox:9115']

  # probe your health endpoints via the blackbox exporter
  - job_name: 'uptimedaddy_health_probe'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - 'http://10.133.51.121:8080/health'
          - 'http://10.133.51.121:8080/health/database'
          - 'http://10.133.51.121:8080/health/mqtt'
    relabel_configs:
      # pass the target URL to the blackbox exporter
      - source_labels: [__address__]
        target_label: __param_target
      # set a readable instance label containing the probed URL
      - source_labels: [__param_target]
        target_label: instance
      # send the probe to the blackbox exporter container
      - target_label: __address__
        replacement: blackbox:9115