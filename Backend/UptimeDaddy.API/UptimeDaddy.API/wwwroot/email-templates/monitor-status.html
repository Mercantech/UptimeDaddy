<div style="margin:0 0 18px;">
  <span style="display:inline-block;padding:6px 12px;border-radius:999px;background:{{badgeBg}};border:1px solid {{badgeBorder}};color:{{badgeFg}};font-size:12px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;">{{badgeLabel}}</span>
</div>

<h1 style="margin:0 0 8px;font-size:22px;font-weight:800;letter-spacing:-0.02em;color:{{statusColor}};">{{headline}}</h1>
<p style="margin:0 0 22px;font-size:14px;line-height:1.55;color:#8fb8a8;">{{statusLine}}</p>

<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:separate;border-spacing:0 8px;">
  <tr>
    <td style="background:#091413;border:1px solid #1e3d34;border-radius:8px;padding:12px 14px;">
      <p style="margin:0 0 4px;font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:#6d9084;">URL</p>
      <p style="margin:0;font-size:15px;font-weight:700;color:#e8fff6;word-break:break-all;">{{websiteUrl}}</p>
    </td>
  </tr>
  <tr>
    <td style="background:#091413;border:1px solid #1e3d34;border-radius:8px;padding:12px 14px;">
      <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
        <tr>
          <td width="50%" style="padding-right:8px;vertical-align:top;">
            <p style="margin:0 0 4px;font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:#6d9084;">HTTP-status</p>
            <p style="margin:0;font-size:18px;font-weight:800;color:{{statusColor}};">{{statusCode}}</p>
          </td>
          <td width="50%" style="padding-left:8px;vertical-align:top;">
            <p style="margin:0 0 4px;font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:#6d9084;">Responstid</p>
            <p style="margin:0;font-size:18px;font-weight:800;color:#c5ebe0;">{{responseTime}}</p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
  {{downtimeBlock}}
</table>

{{ctaBlock}}
