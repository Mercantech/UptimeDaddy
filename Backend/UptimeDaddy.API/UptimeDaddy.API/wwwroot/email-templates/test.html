<div style="margin:0 0 18px;">
  <span style="display:inline-block;padding:6px 12px;border-radius:999px;background:rgba(64,138,113,0.2);border:1px solid #408a71;color:#b0e4cc;font-size:12px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;">Test</span>
</div>

<h1 style="margin:0 0 8px;font-size:22px;font-weight:800;letter-spacing:-0.02em;color:#b0e4cc;">E-mail-integration virker</h1>
<p style="margin:0 0 22px;font-size:14px;line-height:1.55;color:#8fb8a8;">
  Hej {{displayName}} — dette er en testmail fra UptimeDaddy. SMTP er konfigureret korrekt, og du bør også modtage mails ved nedbrud.
</p>

<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:separate;border-spacing:0 8px;">
  <tr>
    <td style="background:#091413;border:1px solid #1e3d34;border-radius:8px;padding:12px 14px;">
      <p style="margin:0 0 4px;font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:#6d9084;">Sendt til</p>
      <p style="margin:0;font-size:15px;font-weight:700;color:#e8fff6;word-break:break-all;">{{email}}</p>
    </td>
  </tr>
  <tr>
    <td style="background:#091413;border:1px solid #1e3d34;border-radius:8px;padding:12px 14px;">
      <p style="margin:0 0 4px;font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:#6d9084;">Tidspunkt (UTC)</p>
      <p style="margin:0;font-size:15px;font-weight:700;color:#c5ebe0;">{{sentAt}}</p>
    </td>
  </tr>
</table>
