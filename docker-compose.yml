services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: uptimedaddy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: uptimedaddy
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uptimedaddy -d uptimedaddy"]
      interval: 5s
      timeout: 5s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  uptimedaddy-api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: uptimedaddy-api
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=uptimedaddy;Username=uptimedaddy;Password=${POSTGRES_PASSWORD}"
      Mqtt__Host: mqtt
      Mqtt__Port: "1883"
      Jwt__Key: ${JWT_SECRET}
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      postgres:
        condition: service_healthy
      mqtt:
        condition: service_started

  service-account:
    build:
      context: ./ServiceAccount
      dockerfile: Dockerfile
    container_name: service-account
    ports:
      - "6969:6969"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: uptimedaddy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: uptimedaddy
      PORT: ":6969"
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  http-requester:
    build:
      context: ./HTTP/http_requester
      dockerfile: Dockerfile
    container_name: http-requester
    environment:
      MQTT_HOST: mqtt
      ACCOUNTS_HOST: service-account
      API_HOST: uptimedaddy-api
      PORT_ACCOUNT: "6969"
      PORT_WEBSITES: "8080"
      MQTT_PORT: "1883"
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      - mqtt
      - uptimedaddy-api
      - service-account

  frontend:
    build:
      context: ./Frontend/Uptime-Daddy
      dockerfile: Dockerfile
      args:
        VITE_ACCOUNTS_URL: http://localhost:6969/accounts
        VITE_API_URL: http://localhost:8080/api
    container_name: uptime-daddy-frontend
    ports:
      - "5173:5173"
    depends_on:
      - uptimedaddy-api
      - service-account

volumes:
  pgdata:
