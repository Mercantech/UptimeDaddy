# Host-porte kan sættes i .env (fx på fællesservere). Interne container-porte er uændrede.
# Eksempel: POSTGRES_PUBLISH_PORT=35432  (undgå kollision med en anden Postgres på 5432)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: uptimedaddy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: uptimedaddy
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PUBLISH_PORT:-35432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uptimedaddy -d uptimedaddy"]
      interval: 5s
      timeout: 5s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "${MQTT_PUBLISH_PORT:-11883}:1883"
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  uptimedaddy-api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "${API_PUBLISH_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/alive"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=uptimedaddy;Username=uptimedaddy;Password=${POSTGRES_PASSWORD}"
      Mqtt__Host: mqtt
      Mqtt__Port: "1883"
      Jwt__Key: ${JWT_SECRET}
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      postgres:
        condition: service_healthy
      mqtt:
        condition: service_started

  service-account:
    build:
      context: ./ServiceAccount
      dockerfile: Dockerfile
    ports:
      - "${SERVICE_ACCOUNT_PUBLISH_PORT:-6969}:6969"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "/dev/null",
          "http://127.0.0.1:6969/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: uptimedaddy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: uptimedaddy
      PORT: ":6969"
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  http-requester:
    build:
      context: ./HTTP/http_requester
      dockerfile: Dockerfile
    environment:
      MQTT_HOST: mqtt
      ACCOUNTS_HOST: service-account
      API_HOST: uptimedaddy-api
      PORT_ACCOUNT: "6969"
      PORT_WEBSITES: "8080"
      MQTT_PORT: "1883"
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      mqtt:
        condition: service_started
      uptimedaddy-api:
        condition: service_healthy
      service-account:
        condition: service_healthy

  frontend:
    build:
      context: ./Frontend/Uptime-Daddy
      dockerfile: Dockerfile
      args:
        VITE_ACCOUNTS_URL: ${VITE_ACCOUNTS_URL:-http://localhost:6969/accounts}
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
    ports:
      - "${FRONTEND_PUBLISH_PORT:-5173}:5173"
    depends_on:
      uptimedaddy-api:
        condition: service_healthy
      service-account:
        condition: service_healthy

volumes:
  pgdata:
