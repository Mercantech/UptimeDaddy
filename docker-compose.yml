# Dokploy-deploy: docker compose up -d --build
#
# Routing (Mercantec — samme mønster som øvrige Mercantec-apps):
#   1. Cloudflare: *.mercantec.tech (wildcard CNAME → tunnel)
#   2. Tunnel ingress: *.mercantec.tech → http://localhost:80
#   3. Traefik (Dokploy): Host(`<domæne>`) → container-port
#
# Kun frontend, API og accounts er eksponeret via Traefik.
# Postgres, MQTT, http-requester og discord-worker er kun på det interne netværk.
#
# Lokal udvikling med host-porte:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: uptimedaddy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: uptimedaddy
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uptimedaddy -d uptimedaddy"]
      interval: 5s
      timeout: 5s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - internal

  uptimedaddy-api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - internal
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.uptimedaddy-api.rule=Host(`${API_DOMAIN:-api-uptimedaddy.mercantec.tech}`)
      - traefik.http.routers.uptimedaddy-api.entrypoints=web
      - traefik.http.routers.uptimedaddy-api.service=uptimedaddy-api
      - traefik.http.services.uptimedaddy-api.loadbalancer.server.port=8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/alive"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=uptimedaddy;Username=uptimedaddy;Password=${POSTGRES_PASSWORD}"
      Mqtt__Host: mqtt
      Mqtt__Port: "1883"
      Jwt__Key: ${JWT_SECRET}
      ASPNETCORE_ENVIRONMENT: Development
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://uptimedaddy.mercantec.tech}
    depends_on:
      postgres:
        condition: service_healthy
      mqtt:
        condition: service_started
      service-account:
        condition: service_healthy

  service-account:
    build:
      context: ./ServiceAccount
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - internal
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.uptimedaddy-accounts.rule=Host(`${ACCOUNTS_DOMAIN:-acc-uptimedaddy.mercantec.tech}`)
      - traefik.http.routers.uptimedaddy-accounts.entrypoints=web
      - traefik.http.routers.uptimedaddy-accounts.service=uptimedaddy-accounts
      - traefik.http.services.uptimedaddy-accounts.loadbalancer.server.port=6969
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "/dev/null",
          "http://127.0.0.1:6969/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: uptimedaddy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: uptimedaddy
      PORT: ":6969"
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://uptimedaddy.mercantec.tech}
      MERCANTEC_CLIENT_ID: ${MERCANTEC_CLIENT_ID:-}
      MERCANTEC_CLIENT_SECRET: ${MERCANTEC_CLIENT_SECRET:-}
      MERCANTEC_ISSUER: ${MERCANTEC_ISSUER:-https://auth.mercantec.tech}
      MERCANTEC_AUDIENCE: ${MERCANTEC_AUDIENCE:-mercantec-apps}
    depends_on:
      postgres:
        condition: service_healthy

  discord-worker:
    build:
      context: ./ServiceAccount
      dockerfile: Dockerfile
    command: ["./discord-worker"]
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "/dev/null",
          "http://127.0.0.1:6970/health",
        ]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 25s
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: uptimedaddy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: uptimedaddy
      MQTT_HOST: mqtt
      MQTT_PORT: "1883"
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_WORKER_METRICS_ADDR: ":6970"
      DISCORD_SLASH_GUILD_ID: ${DISCORD_SLASH_GUILD_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      mqtt:
        condition: service_started

  http-requester:
    build:
      context: ./HTTP/http_requester
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - internal
    environment:
      MQTT_HOST: mqtt
      ACCOUNTS_HOST: service-account
      API_HOST: uptimedaddy-api
      PORT_ACCOUNT: "6969"
      PORT_WEBSITES: "8080"
      MQTT_PORT: "1883"
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      mqtt:
        condition: service_started
      uptimedaddy-api:
        condition: service_healthy
      service-account:
        condition: service_healthy

  frontend:
    build:
      context: ./Frontend/Uptime-Daddy
      dockerfile: Dockerfile
      args:
        VITE_ACCOUNTS_URL: ${VITE_ACCOUNTS_URL:-https://acc-uptimedaddy.mercantec.tech/accounts}
        VITE_API_URL: ${VITE_API_URL:-https://api-uptimedaddy.mercantec.tech/api}
        VITE_BUILD_ID: ${VITE_BUILD_ID:-local}
        VITE_MERCANTEC_CLIENT_ID: ${VITE_MERCANTEC_CLIENT_ID:-}
        VITE_MERCANTEC_ISSUER: ${VITE_MERCANTEC_ISSUER:-https://auth.mercantec.tech}
    restart: unless-stopped
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.uptimedaddy-frontend.rule=Host(`${FRONTEND_DOMAIN:-uptimedaddy.mercantec.tech}`)
      - traefik.http.routers.uptimedaddy-frontend.entrypoints=web
      - traefik.http.routers.uptimedaddy-frontend.service=uptimedaddy-frontend
      - traefik.http.services.uptimedaddy-frontend.loadbalancer.server.port=5173
    depends_on:
      uptimedaddy-api:
        condition: service_healthy
      service-account:
        condition: service_healthy

volumes:
  pgdata:

networks:
  internal:
  dokploy-network:
    external: true
